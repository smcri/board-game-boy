name: Deploy backend to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to Hugging Face Spaces
        env:
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_SPACE_ID" ] || [ -z "$HF_TOKEN" ]; then
            echo "⚠️  HF_SPACE_ID or HF_TOKEN not set — skipping deployment."
            echo "    Set them in repo Settings → Secrets and Variables → Actions."
            exit 0
          fi

          # Configure git identity for the push
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions Bot"

          # Add HF remote — the whole repo is pushed because the root Dockerfile
          # orchestrates the full monorepo build (shared + backend + scaffold).
          # HF git URL format: https://<username>:<token>@huggingface.co/spaces/<owner>/<space>
          # Extract username from HF_SPACE_ID (e.g. "smcri/board-game-builder" -> "smcri")
          HF_USERNAME="${HF_SPACE_ID%%/*}"
          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"

          # Force-push main to the HF Space's main branch.
          # HF Spaces (Docker SDK) will detect the Dockerfile at root and build automatically.
          git push hf HEAD:main --force 2>&1 | sed "s/${HF_TOKEN}/***REDACTED***/g"

      - name: Deployment URL
        if: ${{ vars.HF_SPACE_ID != '' }}
        run: |
          echo "✅ Deployment triggered."
          echo "   Space URL : https://huggingface.co/spaces/${{ vars.HF_SPACE_ID }}"
          echo "   Build logs: https://huggingface.co/spaces/${{ vars.HF_SPACE_ID }}/logs"
