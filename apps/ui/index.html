<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Board Game Builder</title>

    <!--
      CSP (Content Security Policy) meta tag.
      Trade-off: We use 'unsafe-inline' for styles because Tailwind injects them at runtime.
      For a production app, you'd extract Tailwind to a separate CSS file and remove 'unsafe-inline'.

      connect-src must include every origin the UI is allowed to fetch from.
      We deliberately include http://localhost:8787 and http://127.0.0.1:8787
      (the default dev backend) and ws://localhost:5173 (Vite HMR). For
      production you should either:
        a) serve UI and backend from the same origin and drop the localhost
           entries (recommended — simplest CSP), or
        b) replace the localhost entries with your deployed backend origin
           (e.g. https://your-space.hf.space).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https: http://localhost:8787 http://127.0.0.1:8787 ws://localhost:5173 ws://127.0.0.1:5173; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'"
    />

    <meta name="description" content="Design playable board games using AI" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
